<!DOCTYPE html>
<html>
<head>
  <title>Deeptify - Premium Store</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
    }

    header {
      background: linear-gradient(90deg, #ff0057, #ff7b00);
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .tagline {
      text-align: center;
      padding: 10px;
      color: #aaa;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 15px;
      padding: 15px;
    }

    .card {
      background: #1c1c1c;
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 0 10px rgba(255,255,255,0.05);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(255,0,87,0.4);
    }

    .price {
      color: #00ff88;
      font-weight: bold;
    }

    button {
      width: 100%;
      padding: 8px;
      margin-top: 8px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(90deg, #ff0057, #ff7b00);
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    footer {
      text-align: center;
      padding: 15px;
      color: #777;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>🔥 DEEPTIFY PREMIUM STORE</header>

<div class="tagline">Shop Smart | COD Available | Fast Delivery</div>

<div class="grid">

  <div class="card">
    <h3>Trendy Shirt</h3>
    <p class="price">₹499</p>
    <button>Buy Now</button>
  </div>

  <div class="card">
    <h3>Smart Watch</h3>
    <p class="price">₹999</p>
    <button>Buy Now</button>
  </div>

  <div class="card">
    <h3>Headphones</h3>
    <p class="price">₹799</p>
    <button>Buy Now</button>
  </div>

  <div class="card">
    <h3>Shoes</h3>
    <p class="price">₹1299</p>
    <button>Buy Now</button>
  </div>

</div>

<footer>© 2026 Deeptify | Premium Shopping Experience</footer>

</body>
</html>
