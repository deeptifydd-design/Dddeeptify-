<!DOCTYPE html>
<html>
<head>
  <title>Deeptify</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    header {
      background: black;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 10px;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 0 5px gray;
    }

    button {
      background: green;
      color: white;
      border: none;
      padding: 8px;
      width: 100%;
      margin-top: 5px;
      border-radius: 5px;
    }

    footer {
      text-align: center;
      padding: 10px;
      background: black;
      color: white;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
  </style>
</head>

<body>

<header>🔥 Deeptify Store</header>

<div class="products">

  <div class="card">
    <h3>Product 1</h3>
    <p>₹299</p>
    <button>Buy Now</button>
  </div>

  <div class="card">
    <h3>Product 2</h3>
    <p>₹499</p>
    <button>Buy Now</button>
  </div>

</div>

<footer>COD Available | Deeptify</footer>

</body>
</html>
